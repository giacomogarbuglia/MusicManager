<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Production Manager</title>
<style>
  :root {
    --bg: #0d0d0f;
    --bg2: #16161a;
    --bg3: #1e1e24;
    --bg4: #26262e;
    --border: #2e2e38;
    --accent: #7c5cfc;
    --accent2: #a78bfa;
    --accent3: #38bdf8;
    --green: #22c55e;
    --yellow: #eab308;
    --red: #ef4444;
    --orange: #f97316;
    --text: #e8e8f0;
    --text2: #9494a8;
    --text3: #5c5c70;
    --radius: 10px;
    --shadow: 0 4px 24px rgba(0,0,0,0.4);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; font-size: 14px; min-height: 100vh; }

  /* LAYOUT */
  #app { display: flex; height: 100vh; overflow: hidden; }
  #sidebar { width: 220px; background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
  #main { flex: 1; overflow-y: auto; }

  /* SIDEBAR */
  .sidebar-header { padding: 20px 16px 12px; border-bottom: 1px solid var(--border); }
  .sidebar-header h1 { font-size: 13px; font-weight: 700; color: var(--accent2); letter-spacing: .05em; text-transform: uppercase; }
  .sidebar-header p { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 16px; cursor: pointer; color: var(--text2); font-size: 13px; border-left: 3px solid transparent; transition: all .15s; }
  .nav-item:hover { background: var(--bg3); color: var(--text); }
  .nav-item.active { background: var(--bg3); color: var(--accent2); border-left-color: var(--accent); }
  .nav-icon { font-size: 16px; width: 20px; text-align: center; }
  .nav-section { padding: 12px 16px 4px; font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: .08em; }

  /* TOPBAR */
  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 16px 24px; border-bottom: 1px solid var(--border); background: var(--bg2); position: sticky; top: 0; z-index: 10; }
  .topbar h2 { font-size: 16px; font-weight: 600; }
  .topbar-actions { display: flex; gap: 8px; align-items: center; }

  /* BUTTONS */
  .btn { padding: 7px 14px; border-radius: 7px; border: none; cursor: pointer; font-size: 13px; font-weight: 500; transition: all .15s; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #6d4fe0; }
  .btn-secondary { background: var(--bg4); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { background: var(--bg3); }
  .btn-ghost { background: transparent; color: var(--text2); padding: 5px 8px; }
  .btn-ghost:hover { color: var(--text); background: var(--bg4); }
  .btn-danger { background: var(--red); color: #fff; }
  .btn-sm { padding: 4px 10px; font-size: 12px; }
  .btn-icon { width: 30px; height: 30px; padding: 0; display: flex; align-items: center; justify-content: center; font-size: 16px; }

  /* CARDS */
  .card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; }
  .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .card-title { font-size: 15px; font-weight: 600; }

  /* GRID */
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .grid3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .page-content { padding: 20px 24px; }

  /* BADGES */
  .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .badge-album { background: #1e3a5f; color: var(--accent3); }
  .badge-ep { background: #2d1b69; color: var(--accent2); }
  .badge-single { background: #14532d; color: var(--green); }

  /* STATUS */
  .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .s-todo { background: var(--text3); }
  .s-wip { background: var(--yellow); }
  .s-done { background: var(--green); }
  .s-review { background: var(--accent); }

  /* PROGRESS BAR */
  .progress-bar { height: 4px; background: var(--bg4); border-radius: 2px; overflow: hidden; margin-top: 6px; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent3)); border-radius: 2px; transition: width .3s; }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .modal { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; width: 100%; max-width: 560px; max-height: 85vh; overflow-y: auto; box-shadow: var(--shadow); }
  .modal-header { padding: 20px 20px 0; display: flex; justify-content: space-between; align-items: center; }
  .modal-header h3 { font-size: 16px; font-weight: 700; }
  .modal-body { padding: 16px 20px; }
  .modal-footer { padding: 0 20px 20px; display: flex; gap: 8px; justify-content: flex-end; }

  /* FORMS */
  .form-group { margin-bottom: 14px; }
  .form-label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 5px; font-weight: 500; }
  .form-input, .form-select, .form-textarea { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 7px; color: var(--text); padding: 8px 12px; font-size: 13px; outline: none; transition: border .15s; }
  .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--accent); }
  .form-textarea { resize: vertical; min-height: 80px; font-family: inherit; }
  .form-select option { background: var(--bg3); }

  /* PROJECT CARD */
  .proj-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; cursor: pointer; transition: all .15s; position: relative; }
  .proj-card:hover { border-color: var(--accent); background: var(--bg3); }
  .proj-card-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .proj-card-title { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
  .proj-card-sub { font-size: 12px; color: var(--text2); }
  .proj-card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; }

  /* DRAGGABLE */
  .draggable-item { cursor: grab; padding: 10px; border-radius: 8px; transition: opacity .15s; }
  .draggable-item:active { cursor: grabbing; }
  .draggable-item.drag-over { background: var(--bg4); opacity: 0.5; }
  .drag-handle { cursor: grab; font-size: 16px; margin-right: 6px; opacity: 0.6; }

  /* TRACK ROW */
  .track-row { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; margin-bottom: 8px; }
  .track-header { display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
  .track-title { font-weight: 600; font-size: 14px; }
  .track-body { margin-top: 12px; }

  /* TASK */
  .task-phase { margin-bottom: 10px; }
  .phase-header { display: flex; align-items: center; justify-content: space-between; padding: 6px 10px; background: var(--bg4); border-radius: 6px; cursor: pointer; }
  .phase-title { font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .phase-body { padding: 6px 0 0 10px; }
  .subtask-row { display: flex; align-items: center; gap: 8px; padding: 5px 0; border-bottom: 1px solid var(--border); }
  .subtask-row:last-child { border-bottom: none; }
  .subtask-check { width: 16px; height: 16px; accent-color: var(--accent); cursor: pointer; flex-shrink: 0; }
  .subtask-label { flex: 1; font-size: 12px; }
  .subtask-label.done { text-decoration: line-through; color: var(--text3); }
  .subtask-note { font-size: 11px; color: var(--text3); font-style: italic; }

  /* PLANNER TABS */
  .planner-tabs { display: flex; gap: 4px; margin-bottom: 16px; border-bottom: 1px solid var(--border); }
  .planner-tab { padding: 8px 16px; cursor: pointer; font-size: 13px; font-weight: 500; color: var(--text2); border-bottom: 2px solid transparent; transition: all .15s; }
  .planner-tab.active { color: var(--accent2); border-bottom-color: var(--accent); }
  .planner-tab:hover { color: var(--text); }

  /* TIMELINE */
  .timeline-item { display: flex; gap: 14px; margin-bottom: 16px; align-items: flex-start; }
  .timeline-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
  .timeline-line { width: 2px; background: var(--border); position: absolute; top: 16px; bottom: -16px; left: 5px; }
  .timeline-left { position: relative; display: flex; flex-direction: column; align-items: center; padding-top: 4px; }
  .milestone-card { flex: 1; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; }
  .ms-title { font-weight: 600; font-size: 13px; }
  .ms-meta { font-size: 11px; color: var(--text2); margin-top: 2px; }
  .ms-date { font-size: 12px; font-weight: 600; }
  .overdue { border-color: var(--red) !important; }
  .soon { border-color: var(--yellow) !important; }

  /* KNOWLEDGE */
  .kb-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 10px; }
  .kb-tag { display: inline-block; background: var(--bg4); color: var(--text2); font-size: 10px; padding: 2px 7px; border-radius: 10px; margin-right: 4px; }

  /* RISORSE */
  .risorsa-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 10px; cursor: pointer; }
  .risorsa-preview { font-size: 12px; color: var(--text2); margin-top: 6px; white-space: pre-wrap; max-height: 60px; overflow: hidden; }
  .risorsa-file { font-size: 11px; color: var(--accent3); margin-top: 4px; }

  /* HISTORY */
  .history-entry { border-left: 2px solid var(--accent); padding: 6px 12px; margin-bottom: 8px; }
  .history-date { font-size: 11px; color: var(--text3); }
  .history-note { font-size: 12px; }

  /* SETUP */
  .setup-screen { display: flex; align-items: center; justify-content: center; height: 100vh; background: var(--bg); }
  .setup-box { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; padding: 32px; max-width: 460px; width: 100%; box-shadow: var(--shadow); }
  .setup-box h2 { font-size: 20px; margin-bottom: 6px; }
  .setup-box p { color: var(--text2); font-size: 13px; margin-bottom: 20px; }

  /* MISC */
  .empty-state { text-align: center; padding: 48px 24px; color: var(--text3); }
  .empty-state .emoji { font-size: 40px; margin-bottom: 10px; }
  .chip { display: inline-flex; align-items: center; gap: 4px; background: var(--bg4); border: 1px solid var(--border); border-radius: 20px; padding: 3px 10px; font-size: 12px; color: var(--text2); }
  .tag-pill { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; background: var(--bg4); color: var(--text2); margin-right: 4px; }
  .divider { border: none; border-top: 1px solid var(--border); margin: 14px 0; }
  .flex { display: flex; }
  .items-center { align-items: center; }
  .gap8 { gap: 8px; }
  .mt8 { margin-top: 8px; }
  .text-sm { font-size: 12px; color: var(--text2); }
  .text-accent { color: var(--accent2); }
  .fw6 { font-weight: 600; }
  .conn-badge { width: 8px; height: 8px; border-radius: 50%; background: var(--green); display: inline-block; }

  .stat-box { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
  .stat-num { font-size: 28px; font-weight: 700; color: var(--accent2); }
  .stat-label { font-size: 12px; color: var(--text2); margin-top: 2px; }

  .scrollable { overflow-y: auto; max-height: 400px; }
  details > summary { list-style: none; cursor: pointer; }
  details > summary::-webkit-details-marker { display: none; }

  .backup-badge { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 20px; font-size: 11px; border: 1px solid var(--border); }
  .backup-ok { border-color: var(--green); color: var(--green); }
  .backup-warning { border-color: var(--yellow); color: var(--yellow); }
  .backup-alert { border-color: var(--red); color: var(--red); }
</style>
</head>
<body>

<div id="root"></div>

<script>
// ============================================================
// DEFAULT TASK TEMPLATE - NUOVO
// ============================================================
const DEFAULT_PHASES = [

    ]
  },

    subtasks: [

      { id: 's10', name: 'Registrare basso', fixed: true },
      { id: 's11', name: 'Editare basso con Flex Time', fixed: true },
      { id: 's12', name: 'Registrare chitarre', fixed: true },
      { id: 's13', name: 'Editare chitarre con Flex Time', fixed: true },
    ]
  },
  {
    id: 'voci',
    name: 'VOCI',
    subtasks: [
      { id: 's14', name: 'Verificare grammatica, logica e metrica del testo', fixed: true },
      { id: 's15', name: 'Registrare voci', fixed: true },
      { id: 's16', name: 'Editare voci con Flex Time', fixed: true },
      { id: 's17', name: 'Editare voci con Melodyne', fixed: true },
    ]
  },
  {
    id: 'final_edit',
    name: 'EDITING FINALE',
    subtasks: [
      { id: 's18', name: 'Revisione arrangiamento globale', fixed: true },
      { id: 's19', name: 'Timing check globale', fixed: true },
      { id: 's20', name: 'Bounce pre-mix', fixed: true },
    ]
  },
  {
    id: 'mixing',
    name: 'MIXING',
    subtasks: [
      { id: 's21', name: 'Gain staging', fixed: true },
      { id: 's22', name: 'EQ & pulizia frequenze', fixed: true },
      { id: 's23', name: 'Dinamiche (compressori)', fixed: true },
      { id: 's24', name: 'Spazialità (reverb/delay)', fixed: true },
      { id: 's25', name: 'Bus processing', fixed: true },
      { id: 's26', name: 'Mix revision #1', fixed: true },
    ]
  },
  {
    id: 'mastering',
    name: 'MASTERING',
    subtasks: [
      { id: 's27', name: 'Reference matching', fixed: true },
      { id: 's28', name: 'Loudness & limiter', fixed: true },
      { id: 's29', name: 'Export formati (WAV, MP3)', fixed: true },
    ]
  },
  {
    id: 'release',
    name: 'RELEASE',
    subtasks: [
      { id: 's30', name: 'Verificare mix generale in cuffia e casse monitor', fixed: true },
    ]
  },
];

// ============================================================
// DEFAULT PROJECT TASKS - NUOVO
// ============================================================
const DEFAULT_PROJECT_TASKS = [
  { id: 'pt1', name: 'Creare album cover', done: false },
  { id: 'pt2', name: 'Eseguire bounce release album', done: false },
  { id: 'pt3', name: 'Pubblicare con TuneCore', done: false },
  { id: 'pt4', name: 'Pubblicare diritti con SIAE e TuneCore Publishing', done: false, deadline: true },
  { id: 'pt5', name: 'Pubblicare testi con Musixmatch', done: false, deadline: true },
  { id: 'pt6', name: 'Produrre e pubblicare video musicale per YouTube', done: false, deadline: true },
  { id: 'pt7', name: 'Produrre e pubblicare post da 60 secondi per Instagram', done: false, deadline: true },
];

// ============================================================
// STATE
// ============================================================
let STATE = {
  config: null,
  data: null,
  page: 'dashboard',
  activeProject: null,
  activeTrack: null,
  modal: null,
  expandedTracks: {},
  expandedPhases: {},
  plannerTab: 'all',
  dragSource: null,
};

function emptyData() {
  return {
    projects: [],
    knowledge: [
      { id: uid(), title: 'Distributore', category: 'label', content: 'Inserisci qui info su distributore, etichetta, contatti.', tags: ['distribuzione'], history: [] },
      { id: uid(), title: 'DAW & Strumenti', category: 'tools', content: 'Logic Pro X — Melodyne — Waves — Fab Filter\nStrumenti: chitarre, tastiere, microfoni.', tags: ['daw', 'tools'], history: [] },
      { id: uid(), title: 'Store di pubblicazione', category: 'stores', content: 'Spotify, Apple Music, Bandcamp, YouTube Music...', tags: ['stores'], history: [] },
    ],
    releases: [],
    resources: [],
  };
}

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

// ============================================================
// GITHUB API - CON FIX UTF-8
// ============================================================
const GH = {
  headers(token) {
    return { 'Authorization': `token ${token}`, 'Content-Type': 'application/json', 'Accept': 'application/vnd.github.v3+json' };
  },
  async getFile(cfg) {
    const r = await fetch(`https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/data.json`, { headers: GH.headers(cfg.token) });
    if (r.status === 404) return null;
    if (!r.ok) throw new Error('GitHub error: ' + r.status);
    const j = await r.json();
    try {
      const utf8 = decodeURIComponent(escape(atob(j.content.replace(/\n/g, ''))));
      return { content: JSON.parse(utf8), sha: j.sha };
    } catch(e) { throw new Error('Decode error: ' + e.message); }
  },
  async saveFile(cfg, data) {
    const utf8 = unescape(encodeURIComponent(JSON.stringify(data, null, 2)));
    const b64 = btoa(utf8);
    const body = { message: `update ${new Date().toISOString()}`, content: b64, sha: cfg.sha };
    const r = await fetch(`https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/data.json`, { method: 'PUT', headers: GH.headers(cfg.token), body: JSON.stringify(body) });
    if (!r.ok) throw new Error('Save error: ' + r.status);
    const j = await r.json();
    return j.content.sha;
  },
};

// ============================================================
// PERSIST CONFIG
// ============================================================
function loadConfig() {
  try { return JSON.parse(localStorage.getItem('mprod_cfg')); } catch { return null; }
}
function saveConfig(cfg) { localStorage.setItem('mprod_cfg', JSON.stringify(cfg)); }

// ============================================================
// SAVE
// ============================================================
async function saveData() {
  if (!STATE.config) return;
  showToast('Salvataggio...', 'info');
  try {
    const sha = await GH.saveFile(STATE.config, STATE.data);
    STATE.config.sha = sha;
    saveConfig(STATE.config);
    showToast('Salvato ✓', 'success');
  } catch(e) { showToast('Errore salvataggio: ' + e.message, 'error'); }
}

// ============================================================
// TOAST
// ============================================================
function showToast(msg, type = 'info') {
  let t = document.getElementById('toast');
  if (!t) { t = document.createElement('div'); t.id = 'toast'; Object.assign(t.style, { position:'fixed', bottom:'24px', right:'24px', padding:'10px 18px', borderRadius:'8px', fontSize:'13px', fontWeight:'600', zIndex:'9999', transition:'opacity .3s' }); document.body.appendChild(t); }
  t.textContent = msg;
  t.style.background = type === 'success' ? '#166534' : type === 'error' ? '#7f1d1d' : '#1e1e2e';
  t.style.color = '#fff';
  t.style.opacity = '1';
  clearTimeout(t._to);
  t._to = setTimeout(() => { t.style.opacity = '0'; }, 2500);
}

// ============================================================
// RENDER
// ============================================================
function render() {
  const root = document.getElementById('root');
  if (!STATE.config || !STATE.data) { root.innerHTML = renderSetup(); return; }
  root.innerHTML = `
    <div id="app">
      ${renderSidebar()}
      <div id="main">
        ${renderTopbar()}
        <div class="page-content">${renderPage()}</div>
      </div>
    </div>
    ${STATE.modal ? renderModal() : ''}
  `;
  attachEvents();
}

function renderSetup() {
  return `<div class="setup-screen">
    <div class="setup-box">
      <h2>🎛️ Music Production Manager</h2>
      <p>Connetti il tuo repository GitHub per iniziare. I dati verranno salvati come <code>data.json</code> nel tuo repo.</p>
      <div class="form-group"><label class="form-label">GitHub Personal Access Token</label><input class="form-input" id="s-token" type="password" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx"></div>
      <div class="form-group"><label class="form-label">Username GitHub</label><input class="form-input" id="s-owner" placeholder="tuonome"></div>
      <div class="form-group"><label class="form-label">Nome Repository</label><input class="form-input" id="s-repo" placeholder="music-manager"></div>
      <button class="btn btn-primary" style="width:100%" onclick="doSetup()">Connetti e Inizia</button>
      <p style="margin-top:12px;font-size:11px;color:#5c5c70">Il token viene salvato solo nel tuo browser (localStorage). Non viene mai inviato altrove.</p>
    </div>
  </div>`;
}

function renderSidebar() {
  const n = (id, icon, label) => `<div class="nav-item${STATE.page===id?' active':''}" onclick="nav('${id}')">${icon}<span>${label}</span></div>`;
  return `<div id="sidebar">
    <div class="sidebar-header"><h1>🎛️ MProd</h1><p>Music Manager</p></div>
    <div style="padding:8px 0">
      <div class="nav-section">Overview</div>
      ${n('dashboard','📊','Dashboard')}
      ${n('planner','📅','Planner')}
      <div class="nav-section">Produzione</div>
      ${n('projects','🎵','Progetti')}
      ${n('releases','🚀','Release Schedule')}
      <div class="nav-section">Risorse</div>
      ${n('knowledge','📚','Knowledge Base')}
      ${n('resources','📦','Risorse')}
      <div class="nav-section">Sistema</div>

function renderDashboard() {
  const projs = STATE.data.projects;
  const totalTracks = projs.reduce((a,p) => a + (p.tracks||[]).length, 0);
  const wip = projs.filter(p => p.status === 'wip').length;
  const upcomingReleases = (STATE.data.releases||[]).filter(r => !r.done).sort((a,b)=>new Date(a.date)-new Date(b.date)).slice(0,3);
  const recentActivity = getRecentActivity(5);

  return `<div class="grid3" style="margin-bottom:16px">
    <div class="stat-box"><div class="stat-num">${projs.length}</div><div class="stat-label">Progetti totali</div></div>
    <div class="stat-box"><div class="stat-num">${totalTracks}</div><div class="stat-label">Tracce</div></div>
    <div class="stat-box"><div class="stat-num">${wip}</div><div class="stat-label">In lavorazione</div></div>
  </div>
  <div class="grid2">
    <div>
      <div class="card-title fw6 mb8" style="margin-bottom:10px">Attività recente</div>
      ${recentActivity.length ? recentActivity.map(a=>`<div class="history-entry"><div class="history-date">${fmtDate(a.date)}</div><div class="history-note">${a.text}</div></div>`).join('') : '<div class="text-sm">Nessuna attività</div>'}
    </div>
    <div>
      <div class="card-title fw6" style="margin-bottom:10px">Prossime release</div>
      ${upcomingReleases.length ? upcomingReleases.map(r=>`<div class="milestone-card ${deadlineClass(r.date)}" style="margin-bottom:8px"><div class="ms-title">${r.title}</div><div class="ms-meta">${r.project||''}</div><div class="ms-date">${fmtDate(r.date)}</div></div>`).join('') : '<div class="text-sm">Nessuna release pianificata</div>'}
      <div style="margin-top:10px">
        <div class="card-title fw6" style="margin-bottom:10px">Progetti attivi</div>
        ${projs.filter(p=>p.status==='wip').slice(0,3).map(p=>`<div class="proj-card" style="margin-bottom:8px" onclick="openProject('${p.id}')">
          <div class="proj-card-title">${p.name}</div>
          <div class="progress-bar"><div class="progress-fill" style="width:${projectProgress(p)}%"></div></div>
          <div class="text-sm" style="margin-top:4px">${projectProgress(p)}% completato</div>
        </div>`).join('') || '<div class="text-sm">Nessun progetto WIP</div>'}
      </div>
    </div>
  </div>`;
}

function getRecentActivity(n) {
  const acts = [];
  (STATE.data.projects||[]).forEach(p => {
    (p.history||[]).forEach(h => acts.push({ date: h.date, text: `[${p.name}] ${h.note}` }));
    (p.tracks||[]).forEach(t => (t.history||[]).forEach(h => acts.push({ date: h.date, text: `[${p.name} / ${t.name}] ${h.note}` })));
  });
  return acts.sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,n);
}

function projectProgress(p) {
  let total = 0, done = 0;
  (p.tracks||[]).forEach(t => { (t.phases||[]).forEach(ph => { (ph.subtasks||[]).forEach(s => { total++; if (s.done) done++; }); }); });
  (p.projectTasks||[]).forEach(t => { total++; if (t.done) done++; });
  return total ? Math.round(done/total*100) : 0;
}

function phaseProgress(phase) {
  const total = (phase.subtasks||[]).length;
  const done = (phase.subtasks||[]).filter(s=>s.done).length;
  return { total, done, pct: total ? Math.round(done/total*100) : 0 };
}

// PROJECT DETAIL
// ============================================================
function renderProjectDetail() {
  const p = STATE.data.projects.find(x=>x.id===STATE.activeProject);
  if (!p) return '';
  const pct = projectProgress(p);
  const backupStatus = getBackupStatus(p);

  return `<div>
    <button class="btn btn-ghost btn-sm" onclick="STATE.activeProject=null;render()" style="margin-bottom:12px">← Tutti i progetti</button>

      <span class="backup-badge ${backupStatus.class}"><span>${backupStatus.icon}</span> ${backupStatus.text}</span>
    </div>
    <div class="text-sm" style="margin-bottom:12px">${p.description||''}</div>
    <div class="progress-bar" style="height:6px;margin-bottom:16px"><div class="progress-fill" style="width:${pct}%"></div></div>

    <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">
      <button class="btn btn-primary btn-sm" onclick="openModal('new-track','${p.id}')">+ Traccia</button>
      <button class="btn btn-secondary btn-sm" onclick="openModal('edit-project','${p.id}')">✏️ Modifica</button>

    <div style="margin-bottom:20px">
      <h3 style="font-size:14px;font-weight:600;margin-bottom:10px">Attività Progetto</h3>
      ${renderProjectTasks(p)}
    </div>

    <div>
      <h3 style="font-size:14px;font-weight:600;margin-bottom:10px">Tracce</h3>
      ${(p.tracks||[]).length === 0 ? `<div class="empty-state" style="padding:24px"><div class="emoji">🎸</div><p>Nessuna traccia. Aggiungine una!</p></div>` : ''}
      ${(p.tracks||[]).map((t,idx) => renderTrack(p, t, idx)).join('')}
    </div>
  </div>`;
}

function renderProjectTasks(p) {
  if (!(p.projectTasks||[]).length) return '<div class="text-sm">Nessuna attività progetto.</div>';
  return (p.projectTasks||[]).map(pt => `
    <div class="subtask-row">
      <input type="checkbox" class="subtask-check" ${pt.done?'checked':''} onchange="toggleProjectTask('${p.id}','${pt.id}',this.checked)">
      <div style="flex:1">
        <div class="subtask-label ${pt.done?'done':''}">${pt.name}${pt.deadline?' 📅':''}</div>
      </div>
      <button class="btn btn-ghost btn-sm btn-icon" onclick="openModal('edit-project-task','${p.id}','${pt.id}')" style="font-size:12px">✏️</button>
    </div>
  `).join('');
}

function getBackupStatus(p) {
  const lastBackup = p.lastBackup ? new Date(p.lastBackup) : null;
  if (!lastBackup) return { icon: '⚠️', text: 'Nessun backup', class: 'backup-alert' };
  const days = Math.floor((Date.now() - lastBackup) / (1000*60*60*24));
  if (days <= 7) return { icon: '✓', text: `Backup ${days}g fa`, class: 'backup-ok' };
  if (days <= 14) return { icon: '⚠️', text: `Backup ${days}g fa`, class: 'backup-warning' };
  return { icon: '🔴', text: `Backup ${days}g fa`, class: 'backup-alert' };
}

function renderTrack(p, t, idx) {
  const key = p.id + '_' + t.id;
  const open = STATE.expandedTracks[key];
  const tpct = trackProgress(t);

  return `<div class="track-row">
    <div class="track-header" onclick="toggleTrack('${key}')">
      <div class="flex items-center gap8">
        <span style="font-size:18px">${open?'▾':'▸'}</span>
        <div>
          <div class="track-title">${t.name}</div>
          <div class="text-sm">${(t.phases||[]).length} fasi · ${tpct}% completato</div>
        </div>
      </div>
      <div class="flex items-center gap8">
        <div class="progress-bar" style="width:80px"><div class="progress-fill" style="width:${tpct}%"></div></div>
        <button class="btn btn-ghost btn-sm btn-icon" onclick="event.stopPropagation();openModal('track-history','${p.id}','${t.id}')">📋</button>
        <button class="btn btn-ghost btn-sm btn-icon" onclick="event.stopPropagation();openModal('add-track-history','${p.id}','${t.id}')">+</button>
        <button class="btn btn-ghost btn-sm btn-icon" onclick="event.stopPropagation();openModal('edit-track','${p.id}','${t.id}')">✏️</button>
      </div>
    </div>
    ${open ? `<div class="track-body">${renderPhases(p, t)}</div>` : ''}
  </div>`;
}

function trackProgress(t) {
  let total = 0, done = 0;
  (t.phases||[]).forEach(ph => { (ph.subtasks||[]).forEach(s => { total++; if(s.done) done++; }); });
  return total ? Math.round(done/total*100) : 0;
}

function renderPhases(p, t) {
  return (t.phases||[]).map((ph, phIdx) => {
    const key = p.id+'_'+t.id+'_'+ph.id;
    const open = STATE.expandedPhases[key] !== false;
    const prog = phaseProgress(ph);
    return `<div class="task-phase">
      <div class="phase-header" onclick="togglePhase('${key}')">
        <div class="phase-title">
          <span>${open?'▾':'▸'}</span>
          <span>${ph.name}</span>
          <span class="chip">${prog.done}/${prog.total}</span>
        </div>
        <div class="flex items-center gap8">
          <span class="text-sm">${prog.pct}%</span>
          <button class="btn btn-ghost btn-sm" style="font-size:11px;padding:2px 6px" onclick="event.stopPropagation();openModal('add-subtask','${p.id}','${t.id}','${ph.id}')">+ Attività</button>
        </div>
      </div>
      ${open ? `<div class="phase-body">${(ph.subtasks||[]).map((s,sIdx) => renderSubtask(p,t,ph,s,sIdx)).join('')}</div>` : ''}
    </div>`;
  }).join('');
}

function renderSubtask(p, t, ph, s, sIdx) {
  return `<div class="subtask-row">
    <input type="checkbox" class="subtask-check" ${s.done?'checked':''} onchange="toggleSubtask('${p.id}','${t.id}','${ph.id}','${s.id}',this.checked)">
    <div style="flex:1">
      <div class="subtask-label ${s.done?'done':''}">${s.name}${s.fixed?'':' <span style="color:var(--accent3);font-size:10px">custom</span>'}</div>
      ${s.note?`<div class="subtask-note">${s.note}</div>`:''}
    </div>
    <button class="btn btn-ghost btn-sm btn-icon" onclick="openModal('edit-subtask','${p.id}','${t.id}','${ph.id}','${s.id}')" style="font-size:12px">✏️</button>
    ${!s.fixed?`<button class="btn btn-ghost btn-sm btn-icon" onclick="deleteSubtask('${p.id}','${t.id}','${ph.id}','${s.id}')" style="color:var(--red)">✕</button>`:''}
  </div>`;
}

// ============================================================
function renderPlanner() {
  const milestones = [];
  const tracks = []; const projects = []; const releases = [];

  (STATE.data.projects||[]).forEach(p => {
    if (p.deadline) projects.push({ date: p.deadline, title: p.name, sub: 'Deadline progetto', type: 'project', pct: projectProgress(p) });
    (p.tracks||[]).forEach(t => { if (t.deadline) tracks.push({ date: t.deadline, title: t.name, sub: `${p.name}`, type: 'track', pct: trackProgress(t) }); });
  });
  (STATE.data.releases||[]).forEach(r => { if (!r.done) releases.push({ date: r.date, title: r.title, sub: r.project||'Release', type: 'release' }); });

  const tabsHtml = `
    <div class="planner-tabs">
      <div class="planner-tab ${STATE.plannerTab==='all'?'active':''}" onclick="STATE.plannerTab='all';render()">Tutti</div>
      <div class="planner-tab ${STATE.plannerTab==='projects'?'active':''}" onclick="STATE.plannerTab='projects';render()">Progetti</div>
      <div class="planner-tab ${STATE.plannerTab==='tracks'?'active':''}" onclick="STATE.plannerTab='tracks';render()">Tracce</div>
      <div class="planner-tab ${STATE.plannerTab==='releases'?'active':''}" onclick="STATE.plannerTab='releases';render()">Release</div>
    </div>
  `;

  let items = [];
  if (STATE.plannerTab === 'all' || STATE.plannerTab === 'projects') items = items.concat(projects);
  if (STATE.plannerTab === 'all' || STATE.plannerTab === 'tracks') items = items.concat(tracks);
  if (STATE.plannerTab === 'all' || STATE.plannerTab === 'releases') items = items.concat(releases);
  items.sort((a,b) => new Date(a.date)-new Date(b.date));

  const icons = { project:'🎵', track:'🎸', release:'🚀' };
  return tabsHtml + (items.length === 0 ? `<div class="empty-state"><div class="emoji">📅</div><p>Nessuna scadenza in questa categoria.</p></div>` : items.map(m=>`<div class="timeline-item">
    <div class="timeline-left"><div class="timeline-dot" style="background:${m.type==='release'?'var(--green)':m.type==='project'?'var(--accent)':'var(--accent3)'}"></div></div>
    <div class="milestone-card ${deadlineClass(m.date)}">
      <div class="flex items-center gap8" style="justify-content:space-between">
        <div class="ms-title">${icons[m.type]} ${m.title}</div>
        <div class="ms-date">${fmtDate(m.date)}</div>
      </div>
      <div class="ms-meta">${m.sub} ${m.pct!==undefined?`· ${m.pct}%`:''}</div>
      ${m.pct!==undefined?`<div class="progress-bar" style="margin-top:6px"><div class="progress-fill" style="width:${m.pct}%"></div></div>`:''}
    </div>
  </div>`).join(''));
}

async function doSetup() {
  const token = document.getElementById('s-token').value.trim();
  const owner = document.getElementById('s-owner').value.trim();
  const repo = document.getElementById('s-repo').value.trim();
  if (!token||!owner||!repo) { showToast('Compila tutti i campi', 'error'); return; }
  showToast('Connessione in corso...', 'info');
  try {
    const cfg = { token, owner, repo, sha: null };
    let result = await GH.getFile(cfg);
    if (!result) {
      const d = emptyData();
      const sha = await GH.saveFile(cfg, d);
      cfg.sha = sha;
      STATE.data = d;
    } else {
      cfg.sha = result.sha;
      STATE.data = result.content;
    }
    STATE.config = cfg;
    saveConfig(cfg);
    showToast('Connesso! ✓', 'success');
    render();
  } catch(e) { showToast('Errore: ' + e.message, 'error'); }
}

function openProject(id) { STATE.activeProject = id; STATE.page = 'projects'; render(); }
function openModal(type, ...args) { STATE.modal = { type, args }; render(); }

async function init() {
  const cfg = loadConfig();
  if (cfg) {
    STATE.config = cfg;
    showToast('Caricamento dati...', 'info');
    try {
      const result = await GH.getFile(cfg);
      if (result) {
        STATE.data = result.content;
        STATE.config.sha = result.sha;
        saveConfig(STATE.config);
        showToast('Dati caricati ✓', 'success');
      } else {
        STATE.data = emptyData();
        const sha = await GH.saveFile(cfg, STATE.data);
        STATE.config.sha = sha;
        saveConfig(STATE.config);
      }
    } catch(e) {
      showToast('Errore caricamento: ' + e.message, 'error');
      STATE.config = null;
    }
  }
  render();
}

init();
</script>
</body>
</html>
